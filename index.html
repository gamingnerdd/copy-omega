<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Copy Ω</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid #444;
      background-color: #4285f4;
      color: white;
    }
    button:hover {
      background-color: #3367d6;
    }
  </style>
</head>
<body>
  <button onclick="copyOmega()">Copy Ω</button>

  <script>
    function copyOmega() {
      const text = "Ω";
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          alert("Copied: Ω");
        }).catch(function () {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const temp = document.createElement("textarea");
      temp.value = text;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      document.body.removeChild(temp);
      alert("Copied: Ω");
    }
  </script>
</body>
</html>
